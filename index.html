<!DOCTYPE html> <html lang="es"> <head> <meta charset="UTF-8"> <title>X3D Demo</title> <!-- X3DOM --> <script src="https://www.x3dom.org/download/x3dom.js"></script> <link rel="stylesheet" href="https://www.x3dom.org/download/x3dom.css"> </head> <body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:#222;"> <x3d width="600px" height="400px"> <scene> <!-- Fondo --> <Background skyColor='0.1 0.1 0.1'></Background> <!-- Cámara --> <Viewpoint position="0 0 6"></Viewpoint> <!-- Luz --> <DirectionalLight direction="-1 -1 -1"></DirectionalLight> <!-- Objeto --> <Transform rotation="0 1 0 0"> <Shape> <Appearance> <Material diffuseColor="0 0.6 1"></Material> </Appearance> <!-- Cambia Box por Sphere si quieres --> <Box></Box> </Shape> </Transform> </scene> </x3d> </body> </html>
